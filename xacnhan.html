<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác nhận thanh toán</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="pay.css" />
  </head>

  <body>
    <div class="container py-4">
      <h1>Thông tin xác nhận đơn hàng</h1>

      <div class="gap-8">
        <div id="info-container"></div>

        <div class="mt-4">
          <h1>Sản phẩm:</h1>

          <div id="products" class="d-flex gap-4 flex-wrap"></div>

          <div class="mt-3">
            <h3 class="text-danger">Tổng tiền</h3>
            <h2 id="total-price"></h2>
          </div>
        </div>

        <div class="mt-3">
          <button
            type="button"
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#exampleModal"
          >
            Xác nhận đơn hàng
          </button>

          <div
            class="modal fade"
            id="exampleModal"
            tabindex="-1"
            aria-labelledby="exampleModalLabel"
            aria-hidden="true"
          >
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h1 class="modal-title fs-5" id="exampleModalLabel">
                    Thanh toán thành công
                  </h1>
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                  ></button>
                </div>
                <div class="modal-body">Cảm ơn bạn đã mua hàng</div>
                <div class="modal-footer">
                  <button id="backBtn" type="button" class="btn btn-primary">
                    Tiếp tục
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="bg-dark text-white text-center py-2 mt-5">
      <p><b>CONTACT</b></p>
      <a href="https://www.instagram.com/lman._w/">INSTAGRAM</a>
      <a href="https://www.facebook.com/lamyan03/">FACEBOOK</a>
      <p>HOTLINE +84 933 242 168</p>
      <p>PR/Collab: contact@thechoco.vn</p>
      <p>Customer Service: support@thechoco.vn</p>
      <p>Copyright @ 2023 THECHOCO</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="confirm.js"></script>
  </body>
</html>
