<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="dki.css" />
  </head>
  <body>
    <div class="box">
      <h2>Đăng Nhập</h2>
      <script src="firebase-config.js"></script>
      <input type="text" id="email" placeholder="Email" />
      <input type="text" id="user" placeholder="Tên đăng nhập" />
      <input type="password" id="password" placeholder="Mật khẩu" />

      <button onclick="dangNhap()">Đăng Nhập</button>

      <a href="dangki.html">Chưa có tài khoản? Đăng ký mới</a>
    </div>
    <script>
      function dangNhap() {
        ((email = document.getElementById("email").value),
          (password = document.getElementById("password").value),
          firebase
            .auth()
            .signInWithEmailAndPassword(email, password)
            .then((user) => {
              alert("Đăng nhập thành công! Chào " + user.user.email);
              window.location.href = "trangchu.html";
            })
            .catch((error) => alert("Lỗi đăng nhập: " + error.message)));
      }
    </script>
  </body>
</html>
